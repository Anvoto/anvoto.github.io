<h1>端侧AI统一管理与部署平台</h1>

<div class="box">
<h2>背景</h2>
<p>多设备AI能力分散，缺乏统一管理与调度系统。</p>
</div>

<div class="box">
<h2>问题</h2>
<ul>
  <li>设备接入复杂</li>
  <li>模型部署无统一标准</li>
  <li>多项目协作困难</li>
</ul>
</div>

<div class="box">
<h2>我的方案</h2>
<ul>
  <li>设计“项目-设备-模型”三层架构</li>
  <li>模型全生命周期管理</li>
  <li>权限体系 + 动态授权</li>
</ul>
</div>

<div class="box">
<h2>结果</h2>
<p>系统从工具型升级为平台型，支持多设备统一管理。</p>
